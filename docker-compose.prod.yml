services:
  dozzle:
    container_name: dozzle
    build:
      context: .
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data:/data
    environment:
      - DOZZLE_LEVEL=${DOZZLE_LEVEL:-info}
      - DOZZLE_NO_ANALYTICS=${DOZZLE_NO_ANALYTICS:-1}
      - DOZZLE_HOSTNAME=${DOZZLE_HOSTNAME:-}
      - DOZZLE_FILTER=${DOZZLE_FILTER:-}
      - DOZZLE_AUTH_PROVIDER=${DOZZLE_AUTH_PROVIDER:-none}
      - DOZZLE_BASE=${DOZZLE_BASE:-/}
    ports:
      - "${DOZZLE_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
